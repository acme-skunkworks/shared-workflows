# CodeRabbit configuration.
#
# Rollout PRs opt out of CodeRabbit review to spare the fair-usage quota for PRs
# that bring new functionality (A-667). A `!`-prefixed entry is a negative match,
# so this reviews every PR *except* those carrying the `skip-review` label. It
# fails safe: a forgotten label means more review, not less.
reviews:
  auto_review:
    labels:
      - "!skip-review"
    # The release-orchestrator's changelog-enrichment PRs are mechanical,
    # bot-authored post-merge field fills — skip them so they don't burn review
    # quota. Title match is primary; the bot login is the belt-and-braces. Inert
    # until shared-workflows joins the enrich-changelogs matrix (A-597 Layer B).
    ignore_title_keywords:
      - "enrich entry for"
    ignore_usernames:
      - "road-runner-bot[bot]"
