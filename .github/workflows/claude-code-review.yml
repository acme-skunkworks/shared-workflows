name: Claude Code Review

# Self-hosted (inline) copy of the estate's PR-review workflow. See the header of
# claude.yml for why this repo inlines (SHA-pinned) instead of consuming
# reusable-claude-code-review.yml. Keep the two in sync.
#
# `paths-ignore` belongs on the real `pull_request` trigger (it is invalid on
# workflow_call, which is why the reusable version pushes it to the caller). We
# skip review runs that only touch these two self-hosted Claude workflow files.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths-ignore:
      - ".github/workflows/claude.yml"
      - ".github/workflows/claude-code-review.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Dependabot PRs are skipped (A-646): a Dependabot-triggered run reads the
    # Dependabot secret store, not Actions secrets, so CLAUDE_CODE_OAUTH_TOKEN is
    # empty by design and the review can't authenticate — skip cleanly (neutral)
    # rather than conclude failure. Draft and release-please branches skip too.
    #
    # The `skip-review` label spares Claude on the release-orchestrator's
    # unattended automation PRs — fan-out rollouts and changelog-enrichment PRs
    # (A-716). Kept in sync with reusable-claude-code-review.yml's guard (this
    # inline copy reviews this repo's own PRs). Fails safe — a forgotten label
    # means more review, not less.
    if: >-
      github.event.pull_request.draft == false &&
      !startsWith(github.head_ref, 'release-please--') &&
      github.actor != 'dependabot[bot]' &&
      !contains(github.event.pull_request.labels.*.name, 'skip-review')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      issues: read
      # Required: claude-code-action exchanges an OIDC token for its short-lived
      # GitHub token (getOidcToken → setupGitHubToken). Removing it fails the run
      # with "Could not fetch an OIDC token" — it is NOT just for publishing, so
      # the A-329 least-privilege drop was reverted.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full fetch (all branches/tags), not a depth-1 clone of the PR merge
          # ref: with track_progress on, claude-code-action runs an internal
          # `git fetch origin --depth=20 <head-branch>` and needs the branch
          # history available (A-636). (Cost: full history — negligible here.)
          fetch-depth: 0
          # Checkout deliberately does NOT persist the default token in
          # .git/config (artipacked hardening). That alone breaks the internal
          # fetch below, so the next step re-adds a read-scoped credential just
          # for it (A-674).
          persist-credentials: false

      - name: Authenticate git for claude-code-action's internal fetch (A-674)
        # claude-code-action's internal `git fetch origin --depth=20 <head-branch>`
        # (track_progress) uses the ambient git credential, which the checkout
        # above did not persist — so it dies with
        # `fatal: could not read Username for 'https://github.com'` AFTER OIDC
        # succeeds, and no review posts. A-636's fetch-depth: 0 did NOT fix this:
        # the fetch fails on auth, before depth is ever consulted. Re-add just the
        # job's read-scoped GITHUB_TOKEN (contents: read) as a github.com fetch
        # credential — equivalent to persist-credentials: true for the default
        # token, but written explicitly so the purpose and read-only scope are
        # documented and the re-add is a deliberate, minimal exception to the
        # artipacked hardening above (not an accident).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config \
            "http.https://github.com/.extraheader" \
            "AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')"

      - name: 🚦 Guard — CLAUDE_CODE_OAUTH_TOKEN is set
        # A-646: `required: true` on a workflow_call secret only forces the caller
        # to MAP the secret (e.g. `secrets: inherit`) — it does NOT guarantee a
        # non-empty VALUE. A consumer inheriting from a repo where the secret is
        # unset passes an empty string that satisfies the schema, then
        # claude-code-action dies deep in its OIDC/token exchange with an opaque
        # error and no review posts. Fail fast here with a clear message. `secrets`
        # isn't available in a step `if:`, so map it into `env:` and test the shell.
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN is empty. Define it as a repository Actions secret in this repo (it is NOT ANTHROPIC_API_KEY, and there is no org-level secret) (A-646)."
            exit 1
          fi
          echo "OK — CLAUDE_CODE_OAUTH_TOKEN is present."

      - name: Run Claude Code Review
        id: claude-review
        # If startup crashes with an AJV schema error, see anthropics/claude-code-action#947
        # and pin to a known-good version (e.g. v1.0.51).
        uses: anthropics/claude-code-action@12531344451323133b0493233c759991ac61da12 # v1.0.174
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # NB: this action version has NO marketplace ref-pin mechanism.
          # base-action/src/install-plugins.ts validates the input against
          # /^https:\/\/…\.git$/ — it MUST end in `.git` — then passes it
          # verbatim to `claude plugin marketplace add`. A `#tag`/`@ref` suffix
          # fails the regex ("Invalid marketplace URL format") and a bare URL
          # always clones the marketplace at default-branch HEAD. So the
          # immutable-tag pin is impossible here and the marketplace necessarily
          # floats (A-343). Accepted risk: the marketplace repo is the same
          # first-party org (anthropics) as the SHA-pinned action above, and the
          # review is already hardened — tight --allowedTools, no publish
          # identity. Do NOT re-add a `#tag` suffix: it re-breaks the job.
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          allowed_bots: "road-runner-bot[bot]"
          track_progress: true
          use_sticky_comment: true
          claude_args: '--allowedTools "mcp__github_inline_comment__create_inline_comment,mcp__github_comment__update_claude_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'
