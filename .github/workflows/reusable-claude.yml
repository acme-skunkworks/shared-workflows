name: Reusable / Claude Code

# Reusable (workflow_call) version of the estate's interactive `@claude`
# workflow. The triggering events (issue_comment, pull_request_review_comment,
# issues, pull_request_review) stay in the CALLER stub — the original event
# payload is still available to this workflow via the `github` context, so the
# author-association gate below evaluates exactly as it does inline.
#
# REQUIRED CALLER PERMISSIONS (A-621): a called reusable workflow's job cannot be
# granted more than the caller's GITHUB_TOKEN holds. Under the org default
# `default_workflow_permissions: read`, a caller with no `permissions:` block
# hands this workflow a read-only token, the `claude` job below can't get the
# `id-token: write` / `actions: read` (etc.) it needs, and the run dies at compile
# time with a `startup_failure` — no jobs, no logs, and the REST API hides the
# reason (read the one-line error on the Actions UI run page). So the caller MUST
# declare every scope this job needs.
#
# Consume from another repo (SHA-pinned + Dependabot — see README):
#
#   permissions:
#     contents: read
#     pull-requests: read
#     issues: read
#     id-token: write # OIDC token exchange (getOidcToken) — required, not optional
#     actions: read # Claude reads CI results on PRs
#   jobs:
#     claude:
#       uses: acme-skunkworks/shared-workflows/.github/workflows/reusable-claude.yml@<sha>
#       secrets: inherit

on:
  workflow_call:
    inputs:
      timeout_minutes:
        description: Job timeout in minutes.
        type: number
        required: false
        default: 30
      claude_args:
        description: >-
          Extra CLI args forwarded to claude-code-action (e.g.
          '--allowedTools "Bash(gh pr *)"'). Empty by default.
        type: string
        required: false
        default: ""
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: OAuth token for claude-code-action.
        required: true

jobs:
  claude:
    # Author-association gate (A-313): these triggers run in trusted
    # base-repo context with secrets available, so restrict to the
    # maintainer set (OWNER / MEMBER / COLLABORATOR). Without this, any
    # public user could fire a privileged run by commenting "@claude".
    if: |
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
      pull-requests: read
      issues: read
      # Required: claude-code-action exchanges an OIDC token for its short-lived
      # GitHub token (getOidcToken → setupGitHubToken). Removing it fails the run
      # with "Could not fetch an OIDC token" — it is NOT just for publishing, so
      # the A-329 least-privilege drop was reverted.
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          # claude-code-action supplies its own token (OIDC exchange), so don't
          # leave GITHUB_TOKEN in .git/config (artipacked credential exposure).
          persist-credentials: false

      - name: 🚦 Guard — CLAUDE_CODE_OAUTH_TOKEN is set
        # A-646: `required: true` on a workflow_call secret only forces the caller
        # to MAP the secret (e.g. `secrets: inherit`) — it does NOT guarantee a
        # non-empty VALUE. A consumer inheriting from a repo where the secret is
        # unset passes an empty string that satisfies the schema, then
        # claude-code-action dies deep in its OIDC/token exchange with an opaque
        # error and nothing happens. Fail fast here with a clear message. `secrets`
        # isn't available in a step `if:`, so map it into `env:` and test the shell.
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN is empty. Define it as a repository Actions secret in the consuming repo (it is NOT ANTHROPIC_API_KEY, and there is no org-level secret) and pass 'secrets: inherit' from the caller (A-646)."
            exit 1
          fi
          echo "OK — CLAUDE_CODE_OAUTH_TOKEN is present."

      - name: Run Claude Code
        id: claude
        # If startup crashes with an AJV schema error, see anthropics/claude-code-action#947
        # and pin to a known-good version (e.g. v1.0.51).
        uses: anthropics/claude-code-action@428971d2ecd6e3a7cb0ee0da2a3a8b33fdb3678d # v1.0.157
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Forwarded from the caller (default empty). See claude-code-action docs:
          # https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          claude_args: ${{ inputs.claude_args }}
