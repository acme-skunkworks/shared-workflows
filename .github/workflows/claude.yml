name: Claude Code

# Caller stub — dogfoods this repo's own reusable workflow. A consumer repo's
# stub is identical except `uses:` points at
# `acme-skunkworks/shared-workflows/.github/workflows/reusable-claude.yml@<sha>`
# (SHA-pinned + Dependabot). Here we use a local `./` ref so the repo reviews
# itself with the workflow it ships.
#
# Requires the CLAUDE_CODE_OAUTH_TOKEN secret on this repo.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    uses: ./.github/workflows/reusable-claude.yml
    secrets: inherit
