name: Claude Code

# Self-hosted (inline) copy of the estate's interactive `@claude` workflow.
#
# This repo can't consume its own reusable-claude.yml: the org enforces
# `sha_pinning_required`, which rejects local `uses: ./…` refs, and a cross-repo
# self-reference is circular before the first tagged SHA exists (see CLAUDE.md →
# "Why the PR-title check is inline"). So — exactly like the inlined PR-title
# gate in ci.yml — this is a SHA-pinned inline copy of reusable-claude.yml.
# Keep the two in sync: mirror any change to the gate, pins, or permissions.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Author-association gate (A-313): these triggers run in trusted base-repo
    # context with secrets available, so restrict to the maintainer set (OWNER /
    # MEMBER / COLLABORATOR). Without this, any public user could fire a
    # privileged run by commenting "@claude".
    if: |
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
      issues: read
      # Required: claude-code-action exchanges an OIDC token for its short-lived
      # GitHub token (getOidcToken → setupGitHubToken). Removing it fails the run
      # with "Could not fetch an OIDC token" — it is NOT just for publishing, so
      # the A-329 least-privilege drop was reverted.
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          # claude-code-action supplies its own token (OIDC exchange), so don't
          # leave GITHUB_TOKEN in .git/config (artipacked credential exposure).
          persist-credentials: false

      - name: 🚦 Guard — CLAUDE_CODE_OAUTH_TOKEN is set
        # A-646: `required: true` on a workflow_call secret only forces the caller
        # to MAP the secret (e.g. `secrets: inherit`) — it does NOT guarantee a
        # non-empty VALUE. A consumer inheriting from a repo where the secret is
        # unset passes an empty string that satisfies the schema, then
        # claude-code-action dies deep in its OIDC/token exchange with an opaque
        # error and nothing happens. Fail fast here with a clear message. `secrets`
        # isn't available in a step `if:`, so map it into `env:` and test the shell.
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN is empty. Define it as a repository Actions secret in this repo (it is NOT ANTHROPIC_API_KEY, and there is no org-level secret) (A-646)."
            exit 1
          fi
          echo "OK — CLAUDE_CODE_OAUTH_TOKEN is present."

      - name: Run Claude Code
        id: claude
        # If startup crashes with an AJV schema error, see anthropics/claude-code-action#947
        # and pin to a known-good version (e.g. v1.0.51).
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1.0.171
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Allows Claude to read CI results on PRs.
          additional_permissions: |
            actions: read
