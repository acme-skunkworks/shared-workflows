name: Reusable / Claude Code Review

# Reusable (workflow_call) version of the estate's PR-review workflow. The
# `pull_request` trigger — and its `paths-ignore` for the claude workflow files
# — stay in the CALLER stub (paths filters are only valid on real triggers, not
# on workflow_call). See the caller stub in this repo's `claude-code-review.yml`
# and the README for the consumer snippet.
#
# REQUIRED CALLER PERMISSIONS (A-621): a called reusable workflow's job cannot be
# granted more than the caller's GITHUB_TOKEN holds. Under the org default
# `default_workflow_permissions: read`, a caller with no `permissions:` block
# hands this workflow a read-only token, the `claude-review` job below can't get
# the `pull-requests: write` / `id-token: write` it needs, and the run dies at
# compile time with a `startup_failure` — no jobs, no logs, and the REST API hides
# the reason (read the one-line error on the Actions UI run page). This is the
# most common cause of 'Claude review never posts' across consumers. So the caller
# MUST declare every scope this job needs.
#
# Consume from another repo (floating major tag `@v1` — see README):
#
#   permissions:
#     contents: read
#     pull-requests: write # Post the review comment
#     issues: read
#     id-token: write # OIDC token exchange (getOidcToken) — required, not optional
#   jobs:
#     claude-review:
#       uses: acme-skunkworks/shared-workflows/.github/workflows/reusable-claude-code-review.yml@v1
#       secrets: inherit

on:
  workflow_call:
    inputs:
      timeout_minutes:
        description: Job timeout in minutes.
        type: number
        required: false
        default: 30
      track_progress:
        description: Show a live progress checklist on the PR.
        type: boolean
        required: false
        default: true
      use_sticky_comment:
        description: Reuse a single sticky comment instead of posting a new one each run.
        type: boolean
        required: false
        default: true
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: OAuth token for claude-code-action.
        required: true

# NB: NO top-level `concurrency:` here. A called reusable workflow runs as the
# caller's job, so a workflow-level concurrency group in this reusable resolves
# to the SAME value as the identical group the caller sets in its own top-level
# `concurrency:` — GitHub then detects the workflow deadlocking against its own
# called job and cancels the run at startup ("a deadlock was detected for
# concurrency group '<workflow>-<pr#>' between a top level workflow and
# 'claude-review'"). That broke the review for every caller (A-621). Concurrency
# belongs in the CALLER, where the `pull_request` trigger lives; the caller stub
# already declares it, so this reusable must not.

jobs:
  claude-review:
    # Dependabot PRs are skipped (A-646): a Dependabot-triggered run reads the
    # Dependabot secret store, not Actions secrets, so CLAUDE_CODE_OAUTH_TOKEN is
    # empty by design and the review can't authenticate — skip cleanly (neutral)
    # rather than conclude failure. Draft and release-please branches skip too.
    if: >-
      github.event.pull_request.draft == false &&
      !startsWith(github.head_ref, 'release-please--') &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
      pull-requests: write
      issues: read
      # Required: claude-code-action exchanges an OIDC token for its short-lived
      # GitHub token (getOidcToken → setupGitHubToken). Removing it fails the run
      # with "Could not fetch an OIDC token" — it is NOT just for publishing, so
      # the A-329 least-privilege drop was reverted.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full fetch (all branches/tags), NOT a depth-1 clone of the PR merge
          # ref (A-636). With track_progress on, claude-code-action runs an
          # internal `git fetch origin --depth=20 <head-branch>`; a shallow
          # merge-ref checkout lacks that head-branch ref, so the fetch exits 1
          # AFTER OIDC succeeds and no review posts. fetch-depth: 0 makes the ref
          # present. (Cost: full history — negligible for a review job.)
          fetch-depth: 0
          # claude-code-action supplies its own token (OIDC exchange), so don't
          # leave GITHUB_TOKEN in .git/config (artipacked credential exposure).
          persist-credentials: false

      - name: 🚦 Guard — CLAUDE_CODE_OAUTH_TOKEN is set
        # A-646: `required: true` on a workflow_call secret only forces the caller
        # to MAP the secret (e.g. `secrets: inherit`) — it does NOT guarantee a
        # non-empty VALUE. A consumer inheriting from a repo where the secret is
        # unset passes an empty string that satisfies the schema, then
        # claude-code-action dies deep in its OIDC/token exchange with an opaque
        # error and no review posts. Fail fast here with a clear message. `secrets`
        # isn't available in a step `if:`, so map it into `env:` and test the shell.
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN is empty. Define it as a repository Actions secret in the consuming repo (it is NOT ANTHROPIC_API_KEY, and there is no org-level secret) and pass 'secrets: inherit' from the caller (A-646)."
            exit 1
          fi
          echo "OK — CLAUDE_CODE_OAUTH_TOKEN is present."

      - name: Run Claude Code Review
        id: claude-review
        # If startup crashes with an AJV schema error, see anthropics/claude-code-action#947
        # and pin to a known-good version (e.g. v1.0.51).
        uses: anthropics/claude-code-action@428971d2ecd6e3a7cb0ee0da2a3a8b33fdb3678d # v1.0.157
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # NB: this action version has NO marketplace ref-pin mechanism.
          # base-action/src/install-plugins.ts validates the input against
          # /^https:\/\/…\.git$/ — it MUST end in `.git` — then passes it
          # verbatim to `claude plugin marketplace add`. A `#tag`/`@ref` suffix
          # fails the regex ("Invalid marketplace URL format") and a bare URL
          # always clones the marketplace at default-branch HEAD. So the
          # immutable-tag pin is impossible here and the marketplace necessarily
          # floats (A-343). Accepted risk: the marketplace repo is the same
          # first-party org (anthropics) as the SHA-pinned action above, and the
          # review is already hardened — WebSearch/WebFetch disallowed, tight
          # --allowedTools, no publish identity. Do NOT re-add a `#tag` suffix:
          # it re-breaks the job.
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          allowed_bots: "road-runner-bot[bot]"
          track_progress: ${{ inputs.track_progress }}
          use_sticky_comment: ${{ inputs.use_sticky_comment }}
          claude_args: '--allowedTools "mcp__github_inline_comment__create_inline_comment,mcp__github_comment__update_claude_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'
