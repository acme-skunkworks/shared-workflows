name: Validate PR title

# Caller stub — dogfoods this repo's own reusable workflow. A consumer repo's
# stub is identical except `uses:` points at
# `acme-skunkworks/shared-workflows/.github/workflows/reusable-validate-pr-title.yml@<sha>`.
#
# The caller job id is `pr-title` (estate convention) so the status-check
# context is the stable `pr-title / Validate PR title is a Conventional Commit`
# that SK-405 pins as a required check across the estate.
#
# `edited` is included so the check re-runs when a title is corrected — the PR
# title is the squash subject release-please parses for the semver bump (SK-371).

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  pr-title:
    uses: ./.github/workflows/reusable-validate-pr-title.yml
