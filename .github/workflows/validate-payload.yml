name: Validate fanned payload

# Repo-owned onboarding stub (A-780) — placed once; not overwritten by the
# release-orchestrator. Calls the estate's shared payload-exercising check;
# `skills`/`coderabbit` match this repo's install profile. Pin `@v1` (or let
# Dependabot bump a SHA); the status context
# `validate-payload / Validate fanned payload` is pinned REQUIRED in this
# repo's main ruleset so a broken fanned payload turns `mergeable_state` from
# `unstable` to `blocked` (the fan-out spine then refuses to merge it).
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-payload:
    uses: acme-skunkworks/shared-workflows/.github/workflows/reusable-validate-payload.yml@v1
    with:
      skills: true
      coderabbit: false
