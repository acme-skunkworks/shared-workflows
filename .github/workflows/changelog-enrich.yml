name: Changelog enrich

# Post-merge dated-changelog enrich for this deploy target (A-800 / A-821).
# Never pull_request_target. App-token write-back requires secrets: inherit.
on:
  push:
    branches:
      - main

concurrency:
  group: changelog-enrich-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  changelog-enrich:
    uses: acme-skunkworks/shared-workflows/.github/workflows/reusable-changelog-enrich.yml@v1
    with:
      mode: enrich
    permissions:
      contents: read
      pull-requests: read
    secrets: inherit
