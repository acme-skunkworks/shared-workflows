name: CI

# Self-CI for the shared-workflows repo: lint the workflow YAML this repo ships,
# its Markdown, and its PR title. Deliberately lean — no infrastructure/scripts
# + bats apparatus (see CLAUDE.md): this repo holds reusable workflows, not a
# package.
#
# The PR-title and commits checks are INLINE here rather than calling this
# repo's own reusable-validate-*.yml: the org enforces `sha_pinning_required`,
# which rejects local `uses: ./…` reusable refs (startup_failure), and a
# cross-repo self-reference is circular before the first tagged SHA exists.
# Consumers DO reference the reusable workflows — by cross-repo `@v1`, which is
# compliant. See CLAUDE.md "Why the PR-title check is inline".

on:
  pull_request:
    # `edited` re-runs the PR-title check when a title is corrected.
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-title:
    # Mirrors reusable-validate-pr-title.yml so this repo gates its own PRs the
    # same way consumers will. The job name is the estate-canonical status-check
    # string (A-400/405) — keep it stable.
    name: Validate PR title is a Conventional Commit
    runs-on: ubuntu-latest
    permissions:
      # amannn/action-semantic-pull-request only reads PR metadata; keep this
      # narrow so a future edit doesn't broaden or drop it by accident.
      pull-requests: read
    steps:
      - name: 🔠 Lint PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            ci
            refactor
            perf
            test
            build
            style
            revert

  commits:
    # Mirrors reusable-validate-commits.yml (A-981) so this repo gates its own
    # PRs the same way consumers will. The job name is the estate-canonical
    # status-check string (A-400/405) — keep it stable.
    name: Validate commits are Conventional Commits
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HUSKY: 0
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: 📥 Install commitlint (float latest)
        run: |
          set -euo pipefail
          GATE_DIR="${RUNNER_TEMP}/commitlint-gate"
          mkdir -p "$GATE_DIR"
          npm install --prefix "$GATE_DIR" --no-fund --no-audit \
            @commitlint/cli \
            @acme-skunkworks/commitlint-config
          echo "GATE_DIR=${GATE_DIR}" >> "$GITHUB_ENV"

      - name: 🔠 Lint commits (base..head)
        env:
          NODE_PATH: ${{ env.GATE_DIR }}/node_modules
        run: |
          set -euo pipefail
          "${GATE_DIR}/node_modules/.bin/commitlint" \
            --extends @acme-skunkworks/commitlint-config \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to "${{ github.event.pull_request.head.sha }}" \
            --verbose

  workflows:
    name: 📝 YAML & Workflows
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: 📝 Run yamllint
        run: |
          set -euo pipefail
          # `--break-system-packages` is the PEP 668 escape hatch: a no-op on the
          # current runner's Python, but required once `ubuntu-latest` is a distro
          # Python that marks itself externally-managed (Ubuntu 24.04). Mirrors the
          # lint-yaml composite action so the two never drift.
          python3 -m pip install --user --quiet --break-system-packages \
            yamllint==1.37.1
          "$HOME/.local/bin/yamllint" --version
          "$HOME/.local/bin/yamllint" .

      - name: 🔍 Run actionlint
        env:
          ACTIONLINT_VERSION: 1.7.12
          # The installer script is pinned to the v1.7.12 *commit*, not the
          # mutable tag (estate SHA-pinning policy). The script itself verifies
          # the downloaded actionlint binary's checksum before running it.
          # (1.7.6 fixed a false positive on `with: args:` expressions.)
          ACTIONLINT_INSTALLER_SHA: 914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
        run: |
          set -euo pipefail
          base="https://raw.githubusercontent.com/rhysd/actionlint"
          url="${base}/${ACTIONLINT_INSTALLER_SHA}/scripts/download-actionlint.bash"
          bash <(curl -fsSL "$url") "$ACTIONLINT_VERSION"
          ./actionlint -color

      - name: 🚦 Guard — no top-level concurrency in reusables
        # A-621: a reusable (`workflow_call`) runs as the CALLER's job, so a
        # workflow-level `concurrency:` inside a reusable resolves to the same
        # group the caller declares and GitHub deadlock-cancels the run at
        # startup ("a deadlock was detected for concurrency group ... between a
        # top level workflow and '<job>'"). It is invisible to actionlint
        # (runtime concurrency-graph check) and to the REST API — which is why it
        # once slipped through to a human noticing. Concurrency belongs in the
        # caller stub, where the trigger lives; this guard fails if any
        # `reusable-*.yml` reintroduces a top-level (column-0) `concurrency:` key
        # (a job-level `concurrency:` is indented and correctly ignored).
        run: |
          set -euo pipefail
          if grep -lE '^concurrency:' .github/workflows/reusable-*.yml; then
            echo "::error::Reusable workflow(s) above declare a top-level 'concurrency:' — move it to the caller stub; it deadlock-cancels every caller at startup (A-621)."
            exit 1
          fi
          echo "OK — no reusable-*.yml declares a top-level concurrency."

  markdown:
    name: 📝 Markdown
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4.4.0
        with:
          run_install: false

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📝 Lint Markdown
        run: pnpm run lint:md

  changelog:
    name: 📓 Changelog
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4.4.0
        with:
          run_install: false

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📓 Validate changelog entries
        # Shared SoT with the post-merge enricher (A-800): changelog-core.
        run: pnpm run validate:changelog

  go-no-go:
    # The reference GO/NO GO aggregator (A-418), dogfooded here. Its intrinsic
    # check-run named `GO/NO GO` is the single gate the estate ruleset requires
    # (A-425) and the release orchestrator polls (A-419) — pinned to the GitHub
    # Actions integration so it cannot be forged. The job `needs:` every real CI
    # job and fails if any of them failed or was cancelled. See docs/go-no-go-gate.md
    # for the canonical consumer pattern (this repo dogfoods inline per CLAUDE.md).
    name: GO/NO GO # job name = check_run.name = the required check — keep stable
    needs: [pr-title, commits, workflows, markdown, changelog]
    # MANDATORY: without `always()` the aggregator skips whenever a needed job
    # fails, so the gate check-run never reports and merges block forever.
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: ⚖️ Verdict
        # Pass/fail by inspecting the `needs` results. `success` and `skipped`
        # both pass: a path-skipped job is a legitimate non-failure (the estate
        # skip-allowlist for `release-please--*` path-skips lives in consumers
        # that path-filter; this repo's jobs are unconditional, so any `skipped`
        # here would itself be unexpected — but treating it as pass keeps the
        # reference identical to the documented consumer pattern). `failure`,
        # `cancelled` and a null/empty result fail the gate.
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          echo "$NEEDS_JSON" \
            | jq -e 'to_entries | all(.value.result == "success" or .value.result == "skipped")' >/dev/null \
            || { echo "::error::a required check failed — refusing to go"; exit 1; }
          echo "All required checks passed — GO."
