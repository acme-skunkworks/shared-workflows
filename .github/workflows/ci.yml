name: CI

# Self-CI for the shared-workflows repo: lint the workflow YAML this repo ships,
# plus its Markdown. Deliberately lean — no infrastructure/scripts + bats
# apparatus (see CLAUDE.md): this repo holds reusable workflows, not a package.
#
# The conventional-PR-title check is a separate workflow (validate-pr-title.yml)
# that dogfoods this repo's own reusable workflow.

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  workflows:
    name: 📝 YAML & Workflows
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: 📝 Run yamllint
        run: |
          set -euo pipefail
          python3 -m pip install --user --quiet yamllint==1.37.1
          "$HOME/.local/bin/yamllint" --version
          "$HOME/.local/bin/yamllint" .

      - name: 🔍 Run actionlint
        env:
          ACTIONLINT_VERSION: 1.7.5
        run: |
          set -euo pipefail
          bash <(curl -fsSL "https://raw.githubusercontent.com/rhysd/actionlint/v${ACTIONLINT_VERSION}/scripts/download-actionlint.bash") "$ACTIONLINT_VERSION"
          ./actionlint -color

  markdown:
    name: 📝 Markdown
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4.4.0
        with:
          run_install: false

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📝 Lint Markdown
        run: pnpm run lint:md
