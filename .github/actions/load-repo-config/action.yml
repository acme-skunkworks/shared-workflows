---
name: Load repo config
description: Loads non-secret CI/release knobs from infrastructure/repo-config.yaml into step outputs.

outputs:
  default_branch:
    description: Canonical default branch name (mirrors workflows' static triggers where applicable).
    value: ${{ steps.load.outputs.default_branch }}

  node_version_file:
    description: Path passed to actions/setup-node node-version-file.
    value: ${{ steps.load.outputs.node_version_file }}

  npm_registry_url:
    description: Public npm registry URL.
    value: ${{ steps.load.outputs.npm_registry_url }}

  npm_scope:
    description: npm scope for the published package (must equal the owning GitHub org for GitHub Packages).
    value: ${{ steps.load.outputs.npm_scope }}

  github_packages_registry_url:
    description: GitHub Packages npm registry URL (secondary publish target, ASW-323).
    value: ${{ steps.load.outputs.github_packages_registry_url }}

runs:
  using: composite
  steps:
    - id: load
      shell: bash
      run: |
        set -euo pipefail
        ruby -ryaml <<'RUBY'
        cfg_path = File.join(
          ENV.fetch("GITHUB_WORKSPACE"),
          "infrastructure",
          "repo-config.yaml"
        )

        unless File.file?(cfg_path)
          warn("::error title=missing repo-config::Expected #{cfg_path}")
          abort
        end

        cfg = YAML.load_file(cfg_path)
        unless cfg.is_a?(Hash)
          warn("::error title=invalid repo-config::Expected a YAML mapping")
          abort
        end

        gh_out = ENV.fetch("GITHUB_OUTPUT")
        pairs = {}

        # Each value is allowlist-validated against its expected shape before it
        # is written to GITHUB_OUTPUT (ASW-330). These values flow into
        # privileged contexts (setup-node registry-url, the GitHub Packages
        # publish target), and an unvalidated value containing a newline could
        # inject additional step outputs. \A..\z anchors (not ^..$) so an
        # embedded newline can't satisfy the pattern on a single line. No
        # untrusted path exists today (the file only changes via a merged PR),
        # but this fails closed.
        token   = /\A[A-Za-z0-9._\/-]+\z/         # branch names, file paths
        url     = /\Ahttps:\/\/[A-Za-z0-9._:\/-]+\z/  # https registry URLs
        scope   = /\A@[a-z0-9-]+\z/               # npm scope

        mapping = [
          ["default_branch", "defaultBranch", token],
          ["node_version_file", "nodeVersionFile", token],
          ["npm_registry_url", "npmRegistryUrl", url],
          ["npm_scope", "npmScope", scope],
          ["github_packages_registry_url", "githubPackagesRegistryUrl", url]
        ]

        mapping.each do |output_key, yaml_key, pattern|
          raw = cfg[yaml_key]
          if raw.nil? || raw.to_s.strip.empty?
            warn("::error title=missing key::#{yaml_key} missing or empty in infrastructure/repo-config.yaml")
            abort
          end

          value = raw.to_s.strip

          # Guard the `name=value` line format itself, ahead of the pattern
          # check: a newline could append a second output line (output
          # injection), and an `=` could corrupt the key/value split. None of
          # the five mapped keys legitimately contain either, so reject both.
          if value.include?("\n") || value.include?("=")
            warn("::error title=invalid value::#{yaml_key} contains a newline or '=' — refusing to write to GITHUB_OUTPUT")
            abort
          end

          unless value.match?(pattern)
            warn("::error title=invalid value::#{yaml_key}='#{value}' does not match the allowed pattern #{pattern.inspect}")
            abort
          end

          pairs[output_key] = value
        end

        File.open(gh_out, "a") do |f|
          pairs.each { |name, value| f.puts("#{name}=#{value}") }
        end
        RUBY
